<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Interactive Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
    }

    header {
      background: #333;
      color: #fff;
      padding: 15px;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      background: #555;
    }

    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
    }

    nav a:hover {
      background: #222;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    button {
      padding: 10px 15px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #333;
      color: white;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>

<header>
  <h1>My Website</h1>
  <p>HTML, CSS & JavaScript Demo</p>
</header>

<nav>
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#contact">Contact</a>
</nav>

<div class="container">

  <div class="card" id="home">
    <h2>Welcome</h2>
    <p>This is a simple interactive website.</p>
    <button onclick="showMessage()">Click Me</button>
    <p id="message"></p>
  </div>

  <div class="card" id="about">
    <h2>About</h2>
    <p>This website demonstrates basic functionality using HTML, CSS, and JavaScript.</p>
  </div>

  <div class="card" id="contact">
    <h2>Contact Form</h2>
    <input type="text" id="name" placeholder="Enter your name"><br><br>
    <input type="email" id="email" placeholder="Enter your email"><br><br>
    <button onclick="submitForm()">Submit</button>
    <p id="formMessage"></p>
  </div>

</div>

<footer>
  <p>© 2026 My Website</p>
</footer>

<script>
  function showMessage() {
    document.getElementById("message").innerText = "You clicked the button! 🎉";
  }

  function submitForm() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;

    if (name === "" || email === "") {
      document.getElementById("formMessage").innerText = "Please fill all fields.";
      document.getElementById("formMessage").style.color = "red";
    } else {
      document.getElementById("formMessage").innerText = "Form submitted successfully!";
      document.getElementById("formMessage").style.color = "green";
    }
  }
</script>

</body>
</html>
